<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shalom Nexus Academy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            background: #0b3d91;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Logo section */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Links */
        .nav-links a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }

        /* Card */
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Buttons */
        button, .btn {
            background: #0b3d91;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .btn:hover {
            background: #062a66;
        }
        .card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card h2{
    color:#0b3d91;
    margin-bottom:10px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:600;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
}

.btn-primary{
    background:#0b3d91;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn-primary:hover{
    opacity:.9;
}

        /* Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #666;
            margin-top: 40px;
        }
        .dashboard-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.dashboard-header h1{
    margin:0;
    color:#0b3d91;
}

.dashboard-header p{
    color:#666;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:#fff;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.stat-card:hover{
    transform:translateY(-5px);
}

.stat-card h2{
    margin:0;
    font-size:36px;
    color:#0b3d91;
}

.stat-card span{
    color:#666;
}

.action-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.action-btn{
    display:block;
    text-align:center;
    background:#0b3d91;
    color:white;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.action-btn:hover{
    transform:translateY(-2px);
}

.logout-btn{
    background:#dc3545;
}
    </style>
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        <img src="{{ url_for('static', filename='shalom.png') }}">
        <span>Shalom Nexus Academy</span>
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/exams">Exams</a>
        <a href="/logout">Logout</a>
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Shalom Nexus Academy | Powered by CBT System
</div>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<style>
.login-box {
    max-width: 400px;
    margin: 60px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #0b3d91;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #0b3d91;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.login-box button:hover {
    background: #062a66;
}

.error {
    color: red;
    font-size: 14px;
    margin-bottom: 10px;
}

.link {
    margin-top: 15px;
    font-size: 14px;
}
</style>

<div class="login-box">

    <h2>Shalom Nexus Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

       <input type="text" name="identifier"  placeholder="Email or Registration Number" required>

        <input name="password" type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="link">
        No account?
        <a href="/register">Create account</a>
    </div>
    <div class="text-center">
    <a href="{{ url_for('forgot_password') }}">
       Forgot Password?
    </a>

 </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="card"><h2>✏ Edit Question Bank Item</h2>

<form method="POST">

    <label>Subject</label>
    <input type="text"
           name="subject"
           value="{{ question.subject }}"
           required>

    <label>Topic</label>
    <input type="text"
           name="topic"
           value="{{ question.topic }}">

    <label>Question</label>
    <textarea name="question"
              rows="5"
              required>{{ question.question }}</textarea>

    <label>Option A</label>
    <input type="text"
           name="option_a"
           value="{{ question.option_a }}"
           required>

    <label>Option B</label>
    <input type="text"
           name="option_b"
           value="{{ question.option_b }}"
           required>

    <label>Option C</label>
    <input type="text"
           name="option_c"
           value="{{ question.option_c }}"
           required>

    <label>Option D</label>
    <input type="text"
           name="option_d"
           value="{{ question.option_d }}"
           required>

    <label>Correct Answer</label>

    <select name="answer">

        <option value="a"
            {% if question.answer == "a" %}selected{% endif %}>
            A
        </option>

        <option value="b"
            {% if question.answer == "b" %}selected{% endif %}>
            B
        </option>

        <option value="c"
            {% if question.answer == "c" %}selected{% endif %}>
            C
        </option>

        <option value="d"
            {% if question.answer == "d" %}selected{% endif %}>
            D
        </option>

    </select>

    <br><br>

    <button type="submit"
            class="btn btn-success">
        💾 Save Changes
    </button>

    <a href="{{ url_for('question_bank') }}"
       class="btn">
       Cancel
    </a>

</form>

</div>{% endblock %}

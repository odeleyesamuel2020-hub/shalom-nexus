{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow-sm"><h3 class="text-center mb-4">
    Create New Password
</h3>

<form method="POST">

    <div class="mb-3">

        <label>New Password</label>

        <input
            type="password"
            name="password"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label>Confirm Password</label>

        <input
            type="password"
            name="confirm_password"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-success w-100"
    >
        Update Password
    </button>

</form>

</div>{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow-sm"><h3 class="text-center mb-4">
    Password Recovery
</h3>

<form method="POST">

    <div class="mb-3">

        <label>Email Address</label>

        <input
            type="email"
            name="email"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-primary w-100"
    >
        Send Reset Link
    </button>

</form>

</div>{% endblock %}

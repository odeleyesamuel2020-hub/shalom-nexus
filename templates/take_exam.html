{% extends "base.html" %}

{% block content %}

<div class="card">

    <div style="display:flex;justify-content:space-between;align-items:center;">

        <h2>{{ exam.title }}</h2>

        <h3 style="color:#1e3a8a;">
            ⏱ Time Left:
            <span id="timer">--:--</span>
        </h3>

    </div>

    <hr>

    <form method="POST"
          action="{{ url_for('submit_exam', exam_id=exam.id) }}"
          id="examForm">

        {% for q in questions %}

        <div class="question-card">

            <p class="question-title">
                {{ loop.index }}. {{ q.question }}
            </p>

            <label>
                <input type="radio" name="{{ q.id }}" value="A">
                {{ q.option_a }}
            </label>

            <label>
                <input type="radio" name="{{ q.id }}" value="B">
                {{ q.option_b }}
            </label>

            <label>
                <input type="radio" name="{{ q.id }}" value="C">
                {{ q.option_c }}
            </label>

            <label>
                <input type="radio" name="{{ q.id }}" value="D">
                {{ q.option_d }}
            </label>

        </div>

        {% endfor %}

        <button type="submit" class="submit-btn">
            🚀 Submit Exam
        </button>

    </form>

</div>

<style>

.question-card{
    margin-bottom:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    background:#fafafa;
}

.question-title{
    font-weight:bold;
    margin-bottom:10px;
}

.question-card label{
    display:block;
    margin:8px 0;
}

.submit-btn{
    width:100%;
    padding:15px;
    font-size:16px;
}

</style>

<script>

// ======================
// CBT TIMER ENGINE
// ======================

let time = {{ exam.duration }} * 60;

function updateTimer(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    if(seconds < 10){
        seconds = "0" + seconds;
    }

    document.getElementById("timer").innerHTML =
        minutes + ":" + seconds;

    if(time <= 0){

        alert("Time is up. Exam will be submitted.");

        document.getElementById("examForm").submit();

        return;
    }

    time--;
}

setInterval(updateTimer,1000);


// ======================
// TAB SWITCH DETECTION
// ======================

document.addEventListener("visibilitychange",function(){

    if(document.hidden){

        alert(
            "Warning: Tab switching detected."
        );

    }

});


// ======================
// AUTO SAVE ENGINE
// ======================

setInterval(function(){

    let form = document.getElementById("examForm");

    if(form){

        fetch("/auto-save",{
            method:"POST",
            body:new FormData(form)
        });

    }

},10000);


// ======================
// REFRESH WARNING
// ======================

window.onbeforeunload = function(){
    return "Leaving this page may affect your exam.";
};

</script>

{% endblock %}

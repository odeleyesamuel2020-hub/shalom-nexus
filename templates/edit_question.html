{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Edit Question</h2>

<form method="POST">

<label>Question</label>
<textarea name="question" required>
{{ question.question }}
</textarea>

<label>Option A</label>
<input type="text"
       name="option_a"
       value="{{ question.option_a }}"
       required>

<label>Option B</label>
<input type="text"
       name="option_b"
       value="{{ question.option_b }}"
       required>

<label>Option C</label>
<input type="text"
       name="option_c"
       value="{{ question.option_c }}"
       required>

<label>Option D</label>
<input type="text"
       name="option_d"
       value="{{ question.option_d }}"
       required>

<label>Correct Answer</label>

<select name="answer">

<option value="A"
{% if question.answer=="A" %}
selected
{% endif %}
>A</option>

<option value="B"
{% if question.answer=="B" %}
selected
{% endif %}
>B</option>

<option value="C"
{% if question.answer=="C" %}
selected
{% endif %}
>C</option>

<option value="D"
{% if question.answer=="D" %}
selected
{% endif %}
>D</option>

</select>

<br><br>

<button type="submit"
        class="btn btn-primary">
    Save Changes
</button>

</form>

</div>

{% endblock %}
